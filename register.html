<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Registrace — Doupě géniů</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/webp" href="https://res.cloudinary.com/dvhvgspqm/image/upload/v1773826365/favicon_l2b9xa.ico">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #fafafa;
            --text: #0f0f0f;
            --text-secondary: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-light: #dbeafe;
            --border: #e2e8f0;
            --surface: #ffffff;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius: 12px;
            --radius-sm: 8px;
            --nav-bg: rgba(250, 250, 250, 0.8);
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --text: #ededed;
            --text-secondary: #a0a0a0;
            --accent: #60a5fa;
            --accent-hover: #3b82f6;
            --accent-light: #1e293b;
            --border: #262626;
            --surface: #1a1a1a;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.5), 0 2px 4px -2px rgb(0 0 0 / 0.5);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5), 0 4px 6px -4px rgb(0 0 0 / 0.5);
            --nav-bg: rgba(10, 10, 10, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            transition: background-color 0.3s ease, color 0.2s ease;
        }

        h1, h2, h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 0.75rem 1rem;
            transition: background-color 0.3s ease, border-color 0.2s ease;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
            transition: transform 0.2s ease;
        }

        .logo:hover {
            transform: scale(1.02);
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent) 0%, #1d4ed8 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            box-shadow: var(--shadow-sm);
        }

        /* Tlačítko Dark Mode */
        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text);
            font-size: 1.2rem;
            box-shadow: var(--shadow-sm);
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Register Container */
        .register-container {
            max-width: 480px;
            width: 100%;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: fadeInUp 0.6s ease;
            margin-top: 4rem;
        }

        .register-header {
            padding: 2rem 2rem 1rem;
            text-align: center;
        }

        .register-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent) 0%, #1d4ed8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .register-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .register-form {
            padding: 2rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        .form-group input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .password-input {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.25rem;
            transition: color 0.2s ease;
        }

        .toggle-password:hover {
            color: var(--accent);
        }

        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
        }

        .password-strength-text {
            font-size: 0.8rem;
            margin-top: 0.25rem;
            color: var(--text-secondary);
        }

        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .terms-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
            margin-top: 0.2rem;
        }

        .terms-checkbox a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .terms-checkbox a:hover {
            text-decoration: underline;
        }

        .register-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent) 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
            position: relative;
            overflow: hidden;
        }

        .register-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.23);
        }

        .register-btn:hover::before {
            left: 100%;
        }

        .register-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .separator::before {
            margin-right: 1rem;
        }

        .separator::after {
            margin-left: 1rem;
        }

        .social-register {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .social-btn:hover {
            background: var(--surface);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .login-link {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .login-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .login-link a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .error-message {
            background: #fee2e2;
            border: 1px solid #ef4444;
            color: #dc2626;
            padding: 0.8rem 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #dcfce7;
            border: 1px solid #22c55e;
            color: #16a34a;
            padding: 0.8rem 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--accent);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Mobile */
        @media (max-width: 480px) {
            .register-container {
                margin-top: 5rem;
            }
            
            .register-header h1 {
                font-size: 1.75rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">◆</div>
                Doupě géniů
            </a>
            <button class="theme-toggle" id="theme-toggle" aria-label="Přepnout tmavý režim">
                <svg class="sun-icon" viewBox="0 0 24 24" width="20" height="20">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" viewBox="0 0 24 24" width="20" height="20" style="display: none;">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </nav>

    <div class="register-container">
        <div class="register-header">
            <a href="index.html" class="back-link">
                ← Zpět na hlavní stránku
            </a>
            <h1>Vytvoř účet 🚀</h1>
            <p>Přidej se k nám a staň se součástí komunity</p>
        </div>

        <div class="register-form">
            <div class="error-message" id="error-message"></div>
            <div class="success-message" id="success-message"></div>

            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="first-name">Jméno</label>
                        <input type="text" id="first-name" name="first-name" placeholder="Jan" required>
                    </div>

                    <div class="form-group">
                        <label for="last-name">Příjmení</label>
                        <input type="text" id="last-name" name="last-name" placeholder="Novák" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="username">Uživatelské jméno</label>
                    <input type="text" id="username" name="username" placeholder="jan.novak" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="jan.novak@email.cz" required>
                </div>

                <div class="form-group">
                    <label for="password">Heslo</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" placeholder="••••••••" required oninput="checkPasswordStrength(this.value)">
                        <button type="button" class="toggle-password" onclick="togglePassword('password')" tabindex="-1">👁️</button>
                    </div>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="password-strength-bar"></div>
                    </div>
                    <div class="password-strength-text" id="password-strength-text"></div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Potvrď heslo</label>
                    <div class="password-input">
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirm-password')" tabindex="-1">👁️</button>
                    </div>
                </div>

                <label class="terms-checkbox">
                    <input type="checkbox" id="terms" name="terms" required>
                    <span>
                        Souhlasím s <a href="pravidla.html">podmínkami použití</a> a <a href="pravidla.html">ochranou osobních údajů</a>
                    </span>
                </label>

                <button type="submit" class="register-btn" id="register-btn">
                    Zaregistrovat se
                </button>
            </form>

            <div class="separator">nebo se registruj přes</div>

            <div class="social-register">
                <a href="#" class="social-btn" onclick="handleSocialRegister('google')">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </a>
                <a href="#" class="social-btn" onclick="handleSocialRegister('discord')">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515c-.211.379-.458.887-.628 1.298a18.267 18.267 0 0 0-5.487 0 12.64 12.64 0 0 0-.637-1.298A19.74 19.74 0 0 0 3.67 4.37C1.64 7.257 1.027 10.054 1.332 12.798a19.808 19.808 0 0 0 6.018 2.976c.486-.648.915-1.338 1.287-2.068a12.87 12.87 0 0 1-2.03-.974c.17-.12.337-.247.497-.375a14.55 14.55 0 0 0 12.335 0c.16.128.327.255.497.375a12.87 12.87 0 0 1-2.03.974c.372.73.801 1.42 1.287 2.068a19.808 19.808 0 0 0 6.018-2.976c.368-3.148-.575-5.91-2.352-8.428zM8.496 10.84c-.786 0-1.428-.698-1.428-1.553 0-.856.628-1.554 1.428-1.554.8 0 1.44.698 1.428 1.554 0 .855-.64 1.553-1.428 1.553zm6.344 0c-.786 0-1.428-.698-1.428-1.553 0-.856.628-1.554 1.428-1.554.8 0 1.44.698 1.428 1.554 0 .855-.64 1.553-1.428 1.553z"/>
                    </svg>
                    Discord
                </a>
            </div>

            <p class="login-link">
                Už máš účet? <a href="login.html">Přihlas se</a>
            </p>
        </div>
    </div>

    <script>
        // Supabase připojení
        const supabaseUrl = 'https://bkngdqwabavxmaecbtpf.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrbmdkcXdhYmF2eG1hZWNidHBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzMwNDYsImV4cCI6MjA4OTQwOTA0Nn0.xl0wQdN1VI26bG_4AQtrFND88g_O0zM3jHZ_1xUYYY0';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Dark mode
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.querySelector('.sun-icon');
        const moonIcon = document.querySelector('.moon-icon');
        const htmlElement = document.documentElement;

        function setTheme(theme) {
            if (theme === 'dark') {
                htmlElement.setAttribute('data-theme', 'dark');
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
                localStorage.setItem('theme', 'dark');
            } else {
                htmlElement.setAttribute('data-theme', 'light');
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
                localStorage.setItem('theme', 'light');
            }
        }

        function getPreferredTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) return savedTheme;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        setTheme(getPreferredTheme());

        themeToggle.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme') || 'light';
            setTheme(currentTheme === 'light' ? 'dark' : 'light');
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) {
                setTheme(e.matches ? 'dark' : 'light');
            }
        });

        // Funkce pro zobrazení/skrytí hesla
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
        }

        // Kontrola síly hesla
        function checkPasswordStrength(password) {
            const bar = document.getElementById('password-strength-bar');
            const text = document.getElementById('password-strength-text');
            
            let strength = 0;
            let message = '';
            let color = '';

            if (password.length >= 8) strength += 25;
            if (password.match(/[a-z]+/)) strength += 25;
            if (password.match(/[A-Z]+/)) strength += 25;
            if (password.match(/[0-9]+/)) strength += 25;

            if (strength <= 25) {
                message = 'Slabé heslo';
                color = '#ef4444';
            } else if (strength <= 50) {
                message = 'Střední heslo';
                color = '#f59e0b';
            } else if (strength <= 75) {
                message = 'Dobré heslo';
                color = '#3b82f6';
            } else {
                message = 'Silné heslo';
                color = '#22c55e';
            }

            bar.style.width = strength + '%';
            bar.style.background = color;
            text.textContent = message;
        }

        // Registrace
        async function handleRegister(event) {
            event.preventDefault();
            
            const firstName = document.getElementById('first-name').value;
            const lastName = document.getElementById('last-name').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const terms = document.getElementById('terms').checked;
            
            const registerBtn = document.getElementById('register-btn');
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');

            // Schovat předchozí zprávy
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');

            // Validace
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Hesla se neshodují';
                errorDiv.classList.add('show');
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = 'Heslo musí mít alespoň 6 znaků';
                errorDiv.classList.add('show');
                return;
            }

            if (!terms) {
                errorDiv.textContent = 'Musíš souhlasit s podmínkami';
                errorDiv.classList.add('show');
                return;
            }

            // Disable tlačítko
            registerBtn.disabled = true;
            registerBtn.textContent = 'Registrace...';

            try {
                // Registrace uživatele
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            username: username,
                            full_name: firstName + ' ' + lastName,
                        }
                    }
                });

                if (error) throw error;

                // Úspěšná registrace
                successDiv.textContent = 'Registrace proběhla úspěšně! Zkontroluj svůj email pro potvrzení. Přesměrovávám...';
                successDiv.classList.add('show');

                // Přesměrování na hlavní stránku
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);

            } catch (error) {
                console.error('Chyba při registraci:', error);
                errorDiv.textContent = error.message === 'User already registered' 
                    ? 'Uživatel s tímto emailem již existuje' 
                    : 'Chyba při registraci. Zkuste to znovu.';
                errorDiv.classList.add('show');
                
                registerBtn.disabled = false;
                registerBtn.textContent = 'Zaregistrovat se';
            }
        }

        // Sociální registrace (prozatím jen placeholder)
        async function handleSocialRegister(provider) {
            try {
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: provider,
                    options: {
                        redirectTo: window.location.origin + '/index.html'
                    }
                });
                
                if (error) throw error;
            } catch (error) {
                console.error(`Chyba při registraci přes ${provider}:`, error);
                document.getElementById('error-message').textContent = `Chyba při registraci přes ${provider}`;
                document.getElementById('error-message').classList.add('show');
            }
        }

        // Přesměrování pokud je uživatel už přihlášen
        supabase.auth.getUser().then(({ data: { user } }) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
