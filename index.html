<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vzkaz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial Black', 'Helvetica Bold', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            width: 100%;
            text-align: center;
        }
        .animated-text {
            color: #ff4d4d;
            font-size: clamp(3rem, 15vw, 9rem);
            line-height: 1.2;
            text-transform: uppercase;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff6666, 5px 5px 0 #990000;
            animation: shake 0.4s infinite, pulse 1.5s infinite;
            letter-spacing: 4px;
            word-break: break-word;
        }
        .animated-text span {
            display: inline-block;
            animation: wave 2s infinite;
        }
        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(2px, -2px) rotate(0deg); }
            60% { transform: translate(-2px, 2px) rotate(-1deg); }
            80% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0); }
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.02); text-shadow: 0 0 40px #ff0000, 0 0 80px #ff4d4d; }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }
        /* Pro případ, že by někdo chtěl text vybrat nebo s ním hýbat */
        .animated-text::selection {
            background: #ffcc00;
            color: black;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="animated-text">
            <span>N</span><span>I</span><span>C</span><span> </span>
            <span>V</span><span>Á</span><span>M</span><span> </span>
            <span>N</span><span>E</span><span>B</span><span>U</span><span>D</span><span>U</span><span> </span>
            <span>D</span><span>Ě</span><span>L</span><span>A</span><span>T</span><span> </span>
            <span>K</span><span>D</span><span>Y</span><span>Ž</span><span> </span>
            <span>M</span><span>Á</span><span>T</span><span>E</span><span> </span>
            <span>F</span><span>U</span><span>R</span><span>T</span><span> </span>
            <span>N</span><span>Ě</span><span>J</span><span>A</span><span>K</span><span>Ý</span><span> </span>
            <span>P</span><span>R</span><span>O</span><span>B</span><span>L</span><span>É</span><span>M</span>
            <span>.</span><span>.</span><span> </span>
            <span>:</span><span>-</span><span>)</span>
        </h1>
        <!-- Druhá varianta - celý text najednou (pro porovnání) -->
        <!-- <h1 class="animated-text" style="animation: shake 0.4s infinite, pulse 1.5s infinite;">NIC VÁM DĚLAT NEBUDU, KDYŽ MÁTE FURT NĚJAKÝ PROBLÉM. :-)</h1> -->
    </div>
</body>
</html>
