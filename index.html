<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Nový projekt • loading 20%</title>
    <style>
        /* === Profesionální černo-zlatý design === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0b0b; /* jednoduché tmavé pozadí – čisté, profesionální */
            font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
        }

        /* Hlavní karta – minimalistická, luxusní, s jemnými detaily */
        .container {
            max-width: 500px;
            width: 100%;
            background: #111111;
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(212, 175, 55, 0.25);
            padding: 40px 32px 48px 32px;
            text-align: center;
            border: 1px solid #2a2a2a;
            transition: transform 0.2s ease;
        }

        /* Jemné zvýraznění při hover (pouze na desktopu) */
        .container:hover {
            box-shadow: 0 30px 60px -12px #000, 0 0 0 1px rgba(212, 175, 55, 0.4);
        }

        /* === Logo / postavička – čistě profesionální provedení === */
        .logo-wrapper {
            margin: 0 0 24px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-wrapper img {
            display: block;
            width: auto;
            max-width: 75%;
            height: auto;
            max-height: 240px;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.7));
            transition: filter 0.2s ease;
            /* žádné barevné tónování – originální logo, působí přirozeně a profesionálně */
        }

        /* I bez zlatého overlay působí logo díky okolním prvkům prémiově */

        /* === Text – čistý, dobře čitelný, s respektem k prostoru === */
        .project-text {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-weight: 500;
            line-height: 1.2;
            color: #ece8e0;       /* světlá, téměř bílá, pro skvělý kontrast */
            margin: 16px 0 24px 0;
            letter-spacing: -0.02em;
        }

        /* Jednotlivé řádky/text – decentní oddělení */
        .project-text span {
            display: inline-block;
            background: transparent;  /* žádná barevná výplň, pouze text */
            padding: 0 4px;
            font-weight: 400;
        }

        /* První řádek jemně tlustší */
        .project-text .line1 {
            font-weight: 500;
            color: #ffffff;
        }

        .project-text .line2 {
            font-weight: 400;
            color: #d4af37;         /* zlatý akcent pouze na "projektu" – decentní */
            letter-spacing: -0.01em;
        }

        /* === Loading sekce – čistá, přesná, profesionální === */
        .loading-area {
            margin: 32px 0 16px 0;
        }

        /* Popisek "PRÁVĚ NAHRÁVÁM" – decentní, uppercase, tracking */
        .status-label {
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #777777;
            margin-bottom: 16px;
            text-align: center;
        }

        /* Progress bar – velmi čisté provedení */
        .progress-track {
            background: #262626;
            border-radius: 100px;
            height: 8px;                    /* tenký, moderní */
            width: 100%;
            margin: 0 auto 20px auto;
            overflow: hidden;                /* aby se fill pěkně zaoblil */
            border: none;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);
        }

        .progress-fill {
            background: #d4af37;             /* jednolitá zlatá – profesionální */
            width: 20%;
            height: 100%;
            border-radius: 100px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        /* Procenta – čisté, velké, ale ne křiklavé */
        .percentage {
            font-size: 3.2rem;
            font-weight: 600;
            color: #ffffff;
            line-height: 1;
            margin: 18px 0 8px 0;
            letter-spacing: -1px;
        }

        .percentage small {
            font-size: 1.3rem;
            font-weight: 400;
            color: #888888;
            margin-left: 4px;
        }

        /* Doplňková informace – suchá, faktická, bez zbytečných emotikon */
        .eta-note {
            font-size: 0.85rem;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-top: 1px solid #2a2a2a;
            padding-top: 24px;
            margin-top: 16px;
            font-weight: 400;
        }

        /* Velmi malé displeje */
        @media (max-width: 420px) {
            .container {
                padding: 32px 20px 40px 20px;
                border-radius: 36px;
            }
            .logo-wrapper img {
                max-height: 180px;
            }
            .percentage {
                font-size: 2.8rem;
            }
        }

        /* Větší obrazovky – konzistence */
        @media (min-width: 800px) {
            .container {
                max-width: 560px;
                padding: 48px 40px 56px 40px;
            }
        }

        /* Odstranění hover efektů pro dotyk */
        @media (hover: hover) {
            .container:hover {
                transform: translateY(-2px);
            }
        }
        @media (hover: none) {
            .container:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Postavička/logo – čistě, bez rušivých efektů, profesionální prezentace -->
        <div class="logo-wrapper">
            <img 
                src="https://res.cloudinary.com/dvhvgspqm/image/upload/v1773865360/cat-pc2_llvx7u.png" 
                alt="Company mascot – cat working on PC"
                loading="lazy"
                width="400"
                height="400"
            >
        </div>

        <!-- Text "pracuji na novém projektu" – decentně, zlatý akcent na "projektu" -->
        <div class="project-text">
            <span class="line1">pracuji na novém</span><br>
            <span class="line2">projektu.</span>
        </div>

        <!-- Loading 20% – profesionální progress bar a údaje -->
        <div class="loading-area">
            <div class="status-label">PRÁVĚ NAHRÁVÁM</div>

            <!-- Progress bar – tenký, přesný, zlatý -->
            <div class="progress-track" role="progressbar" aria-valuenow="20" aria-valuemin="0" aria-valuemax="100">
                <div class="progress-fill" style="width: 20%;"></div>
            </div>

            <!-- Číselná hodnota 20% – čistá a dobře čitelná -->
            <div class="percentage">
                20<small>%</small>
            </div>
        </div>

        <!-- Velmi decentní poznámka – profesionální "zbývá 80 %" bez zbytečných ikon -->
        <div class="eta-note">
            Zbývá 80 % • odhadovaný čas: neurčen
        </div>
    </div>

    <!-- Malý skript pro konzistenci (bezpečné nastavení 20%) -->
    <script>
        (function() {
            // Garance 20% (kdyby někdo omylem měnil)
            const fill = document.querySelector('.progress-fill');
            const percentDiv = document.querySelector('.percentage');
            
            if (fill) {
                fill.style.width = '20%';
            }
            if (percentDiv) {
                percentDiv.innerHTML = '20<small>%</small>';
            }

            // Obrázek – tichý fallback (není potřeba akce)
            const img = document.querySelector('.logo-wrapper img');
            if (img) {
                img.addEventListener('error', () => {});
            }
        })();
    </script>
</body>
</html>
